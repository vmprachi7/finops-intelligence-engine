name: FinOps Engine CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME:    devopsplatformacr
  IMAGE_NAME:  finops-engine
  NAMESPACE:   finops-engine

jobs:

  # ── Test ───────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          USE_MOCK_DATA:    "true"
          ANTHROPIC_API_KEY: "dummy-for-tests"

  # ── Build + push Docker image ──────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          SHORT_SHA=${{ steps.meta.outputs.version }}
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}

          docker build -t ${IMAGE}:${SHORT_SHA} -t ${IMAGE}:latest .
          docker push ${IMAGE}:${SHORT_SHA}
          docker push ${IMAGE}:latest

          echo "✅ Pushed ${IMAGE}:${SHORT_SHA}"

  # ── Deploy to AKS ──────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: devops-platform-rg
          cluster-name:   devops-platform-aks

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets in cluster
        run: |
          kubectl create secret generic finops-secrets \
            --namespace ${{ env.NAMESPACE }} \
            --from-literal=AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --from-literal=AZURE_TENANT_ID=${{ secrets.ARM_TENANT_ID }} \
            --from-literal=AZURE_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }} \
            --from-literal=AZURE_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }} \
            --from-literal=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/manifests.yaml

      - name: Update image tag
        run: |
          kubectl set image deployment/finops-engine \
            finops-engine=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image-tag }} \
            --namespace ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/finops-engine \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Verify
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get svc  -n ${{ env.NAMESPACE }}
