name: FinOps Engine CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # manual trigger

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME:   devopsplatformacr
  IMAGE_NAME: finops-engine
  NAMESPACE:  finops-engine
  RESOURCE_GROUP: devops-platform-rg
  CLUSTER_NAME:   devops-platform-aks

jobs:

  # ── Job 1: Run tests (every push + PR) ─────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          USE_MOCK_DATA:    "true"
          GROQ_API_KEY:     "dummy-for-tests"

  # ── Job 2: Build + push image to ACR (merge to main only) ──
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # OIDC login — no stored credentials
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"

      - name: Build Docker image
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          SHORT_SHA=${{ steps.tag.outputs.version }}

          docker build \
            -t ${IMAGE}:${SHORT_SHA} \
            -t ${IMAGE}:latest \
            .

          echo "✅ Built ${IMAGE}:${SHORT_SHA}"

      - name: Push to ACR
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          SHORT_SHA=${{ steps.tag.outputs.version }}

          docker push ${IMAGE}:${SHORT_SHA}
          docker push ${IMAGE}:latest

          echo "✅ Pushed ${IMAGE}:${SHORT_SHA}"
          echo "✅ Pushed ${IMAGE}:latest"

      - name: Verify image in ACR
        run: |
          az acr repository show-tags \
            --name ${{ env.ACR_NAME }} \
            --repository ${{ env.IMAGE_NAME }} \
            --output table

  # ── Job 3: Update image tag in k8s manifest ─────────────────
  # Updates the manifest in Git → ArgoCD detects and deploys
  update-manifest:
    name: Update Image Tag in Manifest
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write    # needed to push commit back to repo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s/manifests.yaml
        run: |
          SHORT_SHA=${{ needs.build-push.outputs.image-tag }}
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}

          # Replace image tag in manifest
          sed -i "s|${IMAGE}:.*|${IMAGE}:${SHORT_SHA}|g" k8s/manifests.yaml

          echo "Updated manifest to use image: ${IMAGE}:${SHORT_SHA}"
          grep "image:" k8s/manifests.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/manifests.yaml

          # Only commit if there's a change
          if git diff --staged --quiet; then
            echo "No manifest changes — skipping commit"
          else
            SHORT_SHA=${{ needs.build-push.outputs.image-tag }}
            git commit -m "ci: update finops-engine image to ${SHORT_SHA} [skip ci]"
            git push
            echo "✅ Manifest updated — ArgoCD will sync automatically"
          fi

  # ── Job 4: Trigger ArgoCD sync + verify ─────────────────────
  argocd-sync:
    name: ArgoCD Sync + Verify
    runs-on: ubuntu-latest
    needs: update-manifest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name:   ${{ env.CLUSTER_NAME }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)

          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 8

          argocd login localhost:8080 \
            --username admin \
            --password "$PASS" \
            --insecure

      - name: Trigger ArgoCD sync
        run: |
          argocd app sync finops-engine \
            --timeout 120 \
            --retry-limit 3 || true

          echo "Waiting for sync to complete..."
          sleep 15

          argocd app get finops-engine
          argocd app list

      - name: Wait for pod to be ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=finops-engine \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deployment successful!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get svc  -n ${{ env.NAMESPACE }}
          echo ""
          echo "Access locally:"
          echo "  kubectl port-forward svc/finops-engine -n finops-engine 8080:80"
          echo "  Open: http://localhost:8080"