name: FinOps Engine CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  ACR_NAME:       devopsplatformacr
  IMAGE_NAME:     finops-engine
  NAMESPACE:      finops-engine
  RESOURCE_GROUP: devops-platform-rg
  CLUSTER_NAME:   devops-platform-aks

jobs:

  # ── Job 1: Test ───────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          USE_MOCK_DATA: "true"
          GROQ_API_KEY:  "dummy-for-tests"

  # ── Job 2: Build + push image ─────────────────────────────
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Building image with tag: ${SHORT_SHA}"

      # Use Docker Buildx — properly handles platform targeting
      # no-cache ensures we never use a cached arm64 layer
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64 — no cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          no-cache: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Verify image architecture in ACR
        run: |
          az acr manifest list-metadata \
            --registry ${{ env.ACR_NAME }} \
            --name ${{ env.IMAGE_NAME }} \
            --query "[0].{Architecture:architecture, Os:operatingSystem, Tag:tags[0]}" \
            --output table
          echo "✅ Image pushed — architecture confirmed above"

  # ── Job 3: Update image tag in manifest ───────────────────
  update-manifest:
    name: Update Image Tag
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s/manifests.yaml
        run: |
          SHA=${{ needs.build-push.outputs.image-tag }}
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}

          # Replace whatever tag is there with the new SHA
          sed -i "s|${IMAGE}:.*|${IMAGE}:${SHA}|g" k8s/manifests.yaml

          echo "Updated manifest:"
          grep "image:" k8s/manifests.yaml

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/manifests.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SHA=${{ needs.build-push.outputs.image-tag }}
            git commit -m "ci: update image to ${SHA} [skip ci]"
            git push
            echo "✅ Manifest updated — ArgoCD will sync"
          fi

  # ── Job 4: Create secrets + ArgoCD sync ───────────────────
  argocd-sync:
    name: ArgoCD Sync + Verify
    runs-on: ubuntu-latest
    needs: update-manifest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name:   ${{ env.CLUSTER_NAME }}

      - name: Create namespace + secrets
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic finops-secrets \
            --namespace ${{ env.NAMESPACE }} \
            --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --from-literal=AZURE_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }} \
            --from-literal=AZURE_TENANT_ID=${{ secrets.ARM_TENANT_ID }} \
            --from-literal=AZURE_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }} \
            --from-literal=AZURE_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

          ACR_PASS=$(az acr credential show \
            --name ${{ env.ACR_NAME }} \
            --query passwords[0].value -o tsv)

          kubectl create secret docker-registry acr-secret \
            --namespace ${{ env.NAMESPACE }} \
            --docker-server=${{ env.ACR_NAME }}.azurecr.io \
            --docker-username=${{ env.ACR_NAME }} \
            --docker-password="$ACR_PASS" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ Secrets ready"

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD + sync
        run: |
          PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 8
          argocd login localhost:8080 \
            --username admin --password "$PASS" --insecure

          argocd repo add https://github.com/${{ github.repository }} || true
          kubectl apply -f k8s/manifests.yaml

          sleep 10
          argocd app sync finops-engine --timeout 120 --retry-limit 3 || true
          argocd app list

      - name: Wait for pod ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=finops-engine \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ finops-engine deployed successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get svc  -n ${{ env.NAMESPACE }}